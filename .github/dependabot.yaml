version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - "*"

  # Bump dockerfile FROM
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly

  # Python package requirements
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly

  # Pre-commit
  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: monthly
    groups:
      pre-commit:
        patterns:
          - "*"
